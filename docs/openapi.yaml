  # ---- Search ----------------------------------------------------------------

  /search:
    get:
      tags: [search]
      summary: Full-text search across pages
      operationId: search
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query string
        - name: space
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Limit to a specific space
        - name: tags
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated tag names to filter by
        - name: freshness
          in: query
          required: false
          schema:
            type: string
            enum: [fresh, aging, stale]
          description: Filter by freshness status
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Filter pages updated after this date (ISO 8601)
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Filter pages updated before this date (ISO 8601)
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [relevance, updated_at, freshness_score]
            default: relevance
        - $ref: "#/components/parameters/queryCursor"
        - $ref: "#/components/parameters/queryLimit"
      responses:
