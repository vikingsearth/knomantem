                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Page not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pages/{id}/graph/edges:
    post:
      tags: [graph]
      summary: Create a graph edge from this page to another
      operationId: createEdge
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/pathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEdgeRequest"
      responses:
        "201":
          description: Edge created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEdgeResponse"
        "400":
          description: Malformed request body or invalid UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Source or target page not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error (missing target_page_id or edge_type)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /graph/explore:
    get:
      tags: [graph]
      summary: Explore the knowledge graph from a root page
      operationId: exploreGraph
      security:
        - bearerAuth: []
      parameters:
        - name: root
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: Root page UUID
        - name: depth
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 5
            default: 2
          description: Traversal depth
        - name: edge_type
          in: query
          required: false
          schema:
            type: string
          description: Filter by edge type
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 100
          description: Maximum number of nodes to return
      responses:
        "200":
          description: Subgraph rooted at the given page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphExploreResult"
        "400":
          description: Missing or invalid root parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ---- Tags ------------------------------------------------------------------

  /tags:
    get:
      tags: [tags]
      summary: List tags (with optional search)
      operationId: listTags
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Search query to filter tags by name
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: List of tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags: [tags]
      summary: Create a tag
      operationId: createTag
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTagRequest"
      responses:
        "201":
          description: Tag created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          description: Malformed request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Tag name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pages/{id}/tags:
    post:
      tags: [tags]
      summary: Assign tags to a page
      operationId: addTagsToPage
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/pathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTagsRequest"
      responses:
        "200":
          description: Tags assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddTagsResponse"
        "400":
          description: Malformed request body or invalid UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Page or tag not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error (empty tags array)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ---- Presence --------------------------------------------------------------

  /pages/{id}/presence:
    get:
      tags: [presence]
      summary: WebSocket upgrade — join the presence channel for a page
      operationId: connectPresence
      description: |
        Upgrades the HTTP connection to a WebSocket. The client must send the
        JWT token via the `Authorization: Bearer <token>` header (handled by
        the JWT middleware before the upgrade).

        **Server-sent events** (JSON):
        - `{ "type": "joined",  "user": { ... } }` — a user joined the page
        - `{ "type": "left",   "user_id": "..." }` — a user left the page
        - `{ "type": "viewers","users": [ ... ] }` — current viewer list on connect
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/pathId"
      responses:
        "101":
          description: Switching protocols (WebSocket upgrade)
        "400":
          description: Invalid page UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Page not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pages/{id}/presence/viewers:
    get:
      tags: [presence]
      summary: Get the list of users currently viewing a page
      operationId: getPresenceViewers
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/pathId"
      responses:
        "200":
          description: Active viewers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PresenceUser"
        "400":
          description: Invalid UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
